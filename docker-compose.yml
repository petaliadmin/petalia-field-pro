version: '3.8'

services:
  database:
    image: postgis/postgis:15-3.3
    container_name: petalia_db
    restart: always
    environment:
      POSTGRES_USER: petalia_user
      POSTGRES_PASSWORD: petalia_password
      POSTGRES_DB: petalia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petalia_user -d petalia_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: petalia_redis
    restart: always
    ports:
      - "6380:6379"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: development
    container_name: petalia_backend
    restart: always
    environment:
      DATABASE_URL: postgres://petalia_user:petalia_password@database:5432/petalia_db
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_change_me_in_prod}
      NODE_ENV: development
    command: sh -c "npm run migration:run && npm run start:dev"
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
