version: '3.8'

services:
  database:
    image: postgis/postgis:15-3.3
    container_name: petalia_db
    restart: always
    environment:
      POSTGRES_USER: petalia
      POSTGRES_PASSWORD: petalia_field_pro
      POSTGRES_DB: pfp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petalia -d pfp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: petalia_redis
    restart: always
    ports:
      - "6380:6379"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: development
    container_name: petalia_backend
    restart: always
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgres://petalia:petalia_field_pro@database:5432/pfp_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
    command: ["npm", "run", "start:dev"]
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
