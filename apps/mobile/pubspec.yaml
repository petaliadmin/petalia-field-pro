name: petaliacropassist
description: "Petalia Field Pro - Premium agronomy field companion."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_tile_caching: ^9.1.0
  flutter_map_marker_cluster: ^1.4.0

  # Location & sensors
  geolocator: ^13.0.1

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  audioplayers: ^6.6.0
  image: ^4.5.2
  # Audio capture - record + per-platform impls are pinned together below
  # (Utils section) to keep platform federations in sync.

  # Auth
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Contacts (import farmer phone from device contacts)
  flutter_contacts: ^1.1.9+2

  # UI helpers
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10-1
  lottie: ^3.1.2
  intl_phone_field: ^3.2.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # PDF & share
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.0.2
  url_launcher: ^6.3.1
  path_provider: ^2.1.4

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.18.0
  record: ^6.2.0
  record_android: ^1.5.1
  record_ios: ^1.2.0
  record_linux: ^1.3.0
  record_macos: ^1.2.1
  record_web: ^1.3.0
  record_windows: ^1.0.7
  light: ^5.0.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.0
  excel: ^4.0.6
  firebase_core: ^4.8.0
  firebase_messaging: ^16.2.1
  flutter_local_notifications: ^20.1.0

dependency_overrides:
  # Pinned to 3.6.1 because >=3.6.2 ships a breaking change in the synchronous
  # `Archive.extractFileToDisk` signature that conflicts with `pdf`/`printing`.
  # Revisit once both libraries publish a 3.7-compatible release.
  archive: 3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/ic_launcher.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/ic_launcher.png"
    background_color: "#ffffff"
    theme_color: "#0175C2"
  windows:
    generate: true
    image_path: "assets/images/ic_launcher.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/ic_launcher.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/agro_rules/
    - assets/data/

  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
          weight: 400
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700
