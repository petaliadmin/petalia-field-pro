name: petaliacropassist
description: "Petalia Field Pro - Premium agronomy field companion."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_tile_caching: ^9.1.0
  flutter_map_marker_cluster: ^1.4.0

  # Location & sensors
  geolocator: ^13.0.1

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  # record: ^5.1.2  # Temporarily disabled - build issue on Linux
  audioplayers: ^6.6.0

  # Auth
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # UI helpers
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10-1
  lottie: ^3.1.2

  # PDF & share
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.0.2
  path_provider: ^2.1.4

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.18.0

# No overrides needed

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/ic_launcher.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/ic_launcher.png"
    background_color: "#ffffff"
    theme_color: "#0175C2"
  windows:
    generate: true
    image_path: "assets/images/ic_launcher.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/ic_launcher.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
